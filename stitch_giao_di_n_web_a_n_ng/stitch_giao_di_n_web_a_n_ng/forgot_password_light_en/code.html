<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password (Light - EN)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface-variant": "#c3c6d8",
                    "secondary": "#b4c5ff",
                    "outline-variant": "#424656",
                    "surface-variant": "#32353c",
                    "surface-container": "#1d2026",
                    "surface-container-high": "#272a31",
                    "tertiary-container": "#c84000",
                    "surface-container-highest": "#32353c",
                    "surface-bright": "#363940",
                    "tertiary-fixed": "#ffdbd0",
                    "on-tertiary": "#5d1900",
                    "on-tertiary-fixed": "#390c00",
                    "on-secondary-fixed-variant": "#2a4387",
                    "surface-container-low": "#191c22",
                    "surface": "#101319",
                    "on-primary-fixed-variant": "#003da9",
                    "on-error": "#690005",
                    "on-secondary-container": "#a0b6ff",
                    "on-primary-fixed": "#00174c",
                    "on-tertiary-container": "#fff1ed",
                    "on-secondary": "#0e2b6f",
                    "on-primary-container": "#f3f3ff",
                    "on-background": "#e1e2eb",
                    "error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb59d",
                    "secondary-fixed": "#dbe1ff",
                    "primary-container": "#0f62fe",
                    "inverse-surface": "#e1e2eb",
                    "secondary-container": "#2d458a",
                    "inverse-primary": "#0052dd",
                    "surface-tint": "#b4c5ff",
                    "primary-fixed-dim": "#b4c5ff",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6",
                    "surface-container-lowest": "#0b0e14",
                    "on-tertiary-fixed-variant": "#832700",
                    "outline": "#8c90a2",
                    "inverse-on-surface": "#2e3037",
                    "on-primary": "#002979",
                    "secondary-fixed-dim": "#b4c5ff",
                    "on-secondary-fixed": "#00174c",
                    "tertiary": "#ffb59d",
                    "primary-fixed": "#dbe1ff",
                    "background": "#101319",
                    "on-surface": "#e1e2eb",
                    "surface-dim": "#101319",
                    "primary": "#b4c5ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #0F62FE 0%, #B4C5FF 100%);
        }
        .glass-panel {
            background: rgba(16, 19, 25, 0.7);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface flex flex-col min-h-screen overflow-x-hidden">
<!-- Top Navigation Anchor (Shared Component Execution) -->
<header class="bg-[#101319]/70 backdrop-blur-md fixed top-0 w-full z-50 flex justify-between items-center px-6 h-20 w-full">
<div class="text-xl font-bold tracking-tighter text-[#0F62FE] font-headline">SENTINEL</div>
<div class="flex items-center gap-6">
<span class="text-slate-400 font-label text-sm uppercase tracking-widest opacity-50">Secure Access Point</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-6 mt-20">
<!-- Main Form Container -->
<div class="w-full max-w-md relative">
<!-- Background Decorative Element (Editorial Tech Asymmetry) -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="glass-panel p-8 md:p-12 rounded-xl relative z-10">
<!-- Header Branding -->
<div class="mb-10 text-center md:text-left">
<div class="mb-4 inline-flex items-center justify-center w-12 h-12 rounded-xl bg-surface-container-high">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="font-headline text-3xl md:text-4xl font-bold text-on-surface tracking-tight mb-2 uppercase">Forgot Password</h1>
<p class="text-on-surface-variant font-body leading-relaxed max-w-xs">
                        Enter your corporate email address to receive a secure recovery link.
                    </p>
</div>
<!-- Reset Form -->
<form action="#" class="space-y-8" method="POST">
<div>
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant block mb-3 ml-1" for="corporate-email">
                            Corporate Email
                        </label>
<div class="relative group">
<input class="w-full h-14 bg-surface-container-highest border-none rounded-xl px-4 text-on-surface font-body focus:ring-2 focus:ring-primary-container transition-all placeholder:text-on-surface-variant/50" id="corporate-email" name="email" placeholder="name@company.com" required="" type="email"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none opacity-40">
<span class="material-symbols-outlined text-on-surface" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<div class="pt-2">
<button class="w-full h-14 bg-primary-gradient text-on-primary-container font-headline font-bold text-lg rounded-full flex items-center justify-center gap-2 transition-transform active:scale-[0.98] shadow-[0px_24px_48px_rgba(15,98,254,0.08)]" type="submit">
                            Send Reset Link
                            <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</form>
<!-- Footer Navigation -->
<div class="mt-10 flex flex-col items-center gap-4">
<div class="h-px w-12 bg-surface-container-highest"></div>
<a class="inline-flex items-center gap-2 text-primary font-label text-sm font-medium hover:text-secondary transition-colors group" href="#">
<span class="material-symbols-outlined text-sm transition-transform group-hover:-translate-x-1" data-icon="arrow_back">arrow_back</span>
                        Back to Login
                    </a>
</div>
</div>
<!-- Tonal Sectioning Visual Detail (Bento Grid Style Decor) -->
<div class="mt-8 grid grid-cols-3 gap-4 h-1">
<div class="bg-surface-container-high rounded-full"></div>
<div class="bg-primary-container/30 rounded-full"></div>
<div class="bg-surface-container-high rounded-full"></div>
</div>
</div>
</main>
<!-- Simple Security Footer -->
<footer class="h-20 flex items-center justify-center px-6">
<div class="flex items-center gap-3 text-on-surface-variant/40 text-[10px] font-label uppercase tracking-[0.2em]">
<span class="material-symbols-outlined text-xs" data-icon="verified_user">verified_user</span>
            Sentinel Encrypted Session
        </div>
</footer>
<!-- Decorative Gradient Mesh Background -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[20%] left-[10%] w-[40%] h-[40%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[10%] right-[5%] w-[30%] h-[30%] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
