<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quên mật khẩu (Light - VN)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#424656",
                        "secondary": "#0f62fe",
                        "outline-variant": "#c3c6d8",
                        "surface-variant": "#e1e2eb",
                        "surface-container": "#f3f3ff",
                        "surface-container-high": "#ebebf5",
                        "tertiary-container": "#ffdbd0",
                        "surface-container-highest": "#dee1e9",
                        "surface-bright": "#f9f9ff",
                        "tertiary-fixed": "#ffdbd0",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#390c00",
                        "on-secondary-fixed-variant": "#2a4387",
                        "surface-container-low": "#ffffff",
                        "surface": "#f9f9ff",
                        "on-primary-fixed-variant": "#003da9",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#00174c",
                        "on-primary-fixed": "#00174c",
                        "on-tertiary-container": "#390c00",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#00174c",
                        "on-background": "#101319",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb59d",
                        "secondary-fixed": "#dbe1ff",
                        "primary-container": "#0f62fe",
                        "inverse-surface": "#2e3037",
                        "secondary-container": "#dbe1ff",
                        "inverse-primary": "#b4c5ff",
                        "surface-tint": "#0f62fe",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "on-error-container": "#410002",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#832700",
                        "outline": "#727782",
                        "inverse-on-surface": "#f1f0f4",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#b4c5ff",
                        "on-secondary-fixed": "#00174c",
                        "tertiary": "#832700",
                        "primary-fixed": "#dbe1ff",
                        "background": "#f9f9ff",
                        "on-surface": "#101319",
                        "surface-dim": "#f9f9ff",
                        "primary": "#0f62fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(249, 249, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #0F62FE 0%, #B4C5FF 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar suppressed per Transactional Journey rule -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Ambient Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-tertiary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md z-10">
<!-- Branding Header -->
<div class="mb-12 text-center md:text-left">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="shield">shield</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tighter text-on-background mb-3">
                    SENTINEL
                </h1>
<p class="font-headline text-2xl font-medium tracking-tight text-on-surface-variant leading-tight">
                    Quên mật khẩu (Light - VN)
                </p>
</div>
<!-- Content Card -->
<div class="bg-surface-container-low rounded-full p-10 md:p-12 shadow-[0px_24px_48px_rgba(15,98,254,0.04)] relative">
<!-- Precision Accent Bar -->
<div class="absolute left-0 top-12 bottom-12 w-1 bg-primary rounded-r-full"></div>
<div class="space-y-8">
<p class="font-body text-on-surface-variant leading-relaxed">
                        Nhập địa chỉ email liên kết với tài khoản của bạn. Chúng tôi sẽ gửi một liên kết để thiết lập lại mật khẩu của bạn.
                    </p>
<!-- Form Section -->
<div class="space-y-6">
<div class="space-y-2">
<label class="font-label text-sm font-semibold text-outline tracking-wider uppercase" for="email">
                                Địa chỉ Email
                            </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary/20 transition-all font-body" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full primary-gradient text-on-primary font-headline font-bold py-4 px-6 rounded-xl shadow-[0px_8px_16px_rgba(15,98,254,0.15)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>Gửi liên kết đặt lại</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<div class="pt-6 flex justify-center">
<a class="inline-flex items-center gap-2 font-label font-medium text-primary hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined text-lg" data-icon="arrow_back">arrow_back</span>
<span>Quay lại Đăng nhập</span>
</a>
</div>
</div>
</div>
<!-- Security Assurance -->
<div class="mt-12 flex items-center justify-center gap-6 opacity-40 grayscale">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="font-label text-xs font-bold tracking-widest uppercase">Mã hóa AES-256</span>
</div>
<div class="w-px h-4 bg-outline-variant"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="lock">lock</span>
<span class="font-label text-xs font-bold tracking-widest uppercase">Bảo mật đa lớp</span>
</div>
</div>
</div>
</main>
<!-- Background Texture -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-20">
<div class="absolute inset-0" style="background-image: radial-gradient(#0F62FE 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
</div>
</body></html>
