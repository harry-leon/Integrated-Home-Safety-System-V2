<style>
        body {
            background-color: #101319;
            color: #e1e2eb;
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-status-gradient {
            background: linear-gradient(135deg, #0f62fe 0%, #b4c5ff 100%);
        }
        .glass-panel {
            background-color: rgba(16, 19, 25, 0.7);
            backdrop-filter: blur(20px);
        }

<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Suppress TopAppBar and SideNavBar for transactional/linear flow as per instructions -->
<!-- Background Decoration -->
<div class="fixed inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary-container/10 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-tertiary/5 blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[480px]">
<div class="flex flex-col items-center">
<!-- Branding Area -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high mb-6">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<h1 class="text-4xl font-extrabold tracking-tighter text-white mb-2 font-headline uppercase">SENTINEL</h1>
<p class="text-on-surface-variant/70 font-label tracking-widest text-xs uppercase">PRECISION SECURE SYSTEMS</p>
</div>
<!-- Interaction Card -->
<div class="w-full bg-surface-container p-10 rounded-xl shadow-2xl border border-white/5">
<div class="mb-8">
<h2 class="text-2xl font-semibold text-white mb-3">Quên mật khẩu</h2>
<p class="text-on-surface-variant body-md leading-relaxed">
                        Nhập email để nhận hướng dẫn khôi phục
                    </p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-medium uppercase tracking-wider text-on-surface-variant font-label" for="email">Địa chỉ Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-sm text-on-surface placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary-container transition-all outline-none font-body" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 px-6 bg-status-gradient text-on-primary-container font-bold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all duration-300 shadow-lg shadow-primary-container/20" type="submit">
<span>Gửi link khôi phục</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Footer Navigation -->
<div class="mt-10 flex flex-col items-center">
<a class="group flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors py-2" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="font-medium">Quay lại Đăng nhập</span>
</a>
</div>
</div>
<!-- Aesthetic Footer / Compliance -->
<div class="mt-12 text-center">
<p class="text-xs text-on-surface-variant/40 font-label tracking-tight">
                    © 2024 SENTINEL GLOBAL SECURITY. ALL RIGHTS RESERVED.
                </p>
</div>
</div>
</main>
<!-- Decorative Image Panel (Hidden on Mobile) -->
<div class="hidden lg:block fixed right-12 top-1/2 -translate-y-1/2 w-80 h-[500px] rounded-2xl overflow-hidden shadow-2xl opacity-40">
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent z-10"></div>
